Parameters:
  KeyName:
    Description: Name of existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  LatestAmiId:
    Description: (DO NOT CHANGE)
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64

Resources:
  # --- [1] 네트워크 구성: VPC ---
  AWSVPC1:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.70.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: AWS-VPC1}]

  IDCVPC2:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.80.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: IDC-VPC2}]

  # --- [2] 네트워크 구성: 서브넷 ---
  AWSVPC1Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AWSVPC1
      CidrBlock: 10.70.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: AWS-VPC1-SN1}]

  AWSVPC1Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AWSVPC1
      CidrBlock: 10.70.2.0/24
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: AWS-VPC1-SN2}]

  IDCVPC2Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref IDCVPC2
      CidrBlock: 10.80.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: IDC-VPC2-SN}]

  # --- [3] 게이트웨이 및 라우팅 ---
  IGW1: {Type: "AWS::EC2::InternetGateway"}
  AttachIGW1:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref AWSVPC1, InternetGatewayId: !Ref IGW1}

  IGW2: {Type: "AWS::EC2::InternetGateway"}
  AttachIGW2:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: {VpcId: !Ref IDCVPC2, InternetGatewayId: !Ref IGW2}

  VPCPeering:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref AWSVPC1
      PeerVpcId: !Ref IDCVPC2
      Tags: [{Key: Name, Value: AWS-IDC-Peering}]

  RT1:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref AWSVPC1, Tags: [{Key: Name, Value: AWS-RT}]}

  Route1Default:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref RT1, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref IGW1}

  Route1ToIDC:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref RT1, DestinationCidrBlock: 10.80.0.0/16, VpcPeeringConnectionId: !Ref VPCPeering}

  RT2:
    Type: AWS::EC2::RouteTable
    Properties: {VpcId: !Ref IDCVPC2, Tags: [{Key: Name, Value: IDC-RT}]}

  Route2Default:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref RT2, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref IGW2}

  Route2ToAWS:
    Type: AWS::EC2::Route
    Properties: {RouteTableId: !Ref RT2, DestinationCidrBlock: 10.70.0.0/16, VpcPeeringConnectionId: !Ref VPCPeering}

  Assoc1: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {RouteTableId: !Ref RT1, SubnetId: !Ref AWSVPC1Subnet1}}
  Assoc2: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {RouteTableId: !Ref RT1, SubnetId: !Ref AWSVPC1Subnet2}}
  Assoc3: {Type: AWS::EC2::SubnetRouteTableAssociation, Properties: {RouteTableId: !Ref RT2, SubnetId: !Ref IDCVPC2Subnet}}

  # --- [4] 보안 그룹 ---
  AWSSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow All Traffic for Lab"
      VpcId: !Ref AWSVPC1
      SecurityGroupIngress:
        - IpProtocol: -1  # 모든 프로토콜 (-1)
          FromPort: -1    # 모든 포트
          ToPort: -1
          CidrIp: 0.0.0.0/0

  IDCSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow All Traffic for IDC Lab"
      VpcId: !Ref IDCVPC2
      SecurityGroupIngress:
        - IpProtocol: -1  # 모든 프로토콜 (-1)
          FromPort: -1    # 모든 포트
          ToPort: -1
          CidrIp: 0.0.0.0/0

  # --- [5] EC2 인스턴스 구성 (총 4대) ---
  AWSWEB1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref AWSVPC1Subnet1
      PrivateIpAddress: 10.70.1.100
      SecurityGroupIds: [!Ref AWSSG]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Welcome to AWS-WEB1 (10.70.1.100)</h1>" > /var/www/html/index.html
      Tags: [{Key: Name, Value: AWS-WEB1}]

  AWSWEB2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref AWSVPC1Subnet2
      PrivateIpAddress: 10.70.2.100
      SecurityGroupIds: [!Ref AWSSG]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Welcome to AWS-WEB2 (10.70.2.100)</h1>" > /var/www/html/index.html
      Tags: [{Key: Name, Value: AWS-WEB2}]

  IDCDNSSRV:
    Type: AWS::EC2::Instance
    # 엔드포인트가 먼저 생성되어야 통신이 되므로 의존성은 유지합니다.
    DependsOn: InboundEndpoint
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref IDCVPC2Subnet
      PrivateIpAddress: 10.80.1.200
      SecurityGroupIds: [!Ref IDCSG]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf install -y bind bind-utils
          cat <<EOF > /etc/named.conf
          options {
              listen-on port 53 { any; };
              directory "/var/named";
              allow-query { any; };
              recursion yes;
              dnssec-validation no;
          };
          zone "idcneta.internal" IN { type master; file "idcneta.internal.zone"; };
          zone "awsneta.internal" IN {
              type forward;
              forward only;
              forwarders { 10.70.1.4; 10.70.2.4; };
          };
          include "/etc/named.rfc1912.zones";
          include "/etc/named.root.key";
          EOF
          cat <<EOF > /var/named/idcneta.internal.zone
          \$TTL 3H
          @   IN SOA  @ rname.invalid. ( 0 1D 1H 1W 3H )
              NS  @
              A   10.80.1.200
          websrv IN  A   10.80.1.100
          dnssrv IN A 10.80.1.200
          EOF
          chown root:named /etc/named.conf
          chown named:named /var/named/idcneta.internal.zone
          chmod 644 /var/named/idcneta.internal.zone
          sed -i '1i nameserver 127.0.0.1' /etc/resolv.conf
          systemctl start named
          systemctl enable named
      Tags: [{Key: Name, Value: IDC-DNSSRV}]

  IDCWEBSRV:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref IDCVPC2Subnet
      PrivateIpAddress: 10.80.1.100
      SecurityGroupIds: [!Ref IDCSG]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Welcome to IDC-WEBSRV (10.80.1.100)</h1>" > /var/www/html/index.html
          sed -i '1i nameserver 10.80.1.200' /etc/resolv.conf
      Tags: [{Key: Name, Value: IDC-WEBSRV}]

  # --- [6] Route 53 Resolver ---
  InboundEndpoint:
    Type: AWS::Route53Resolver::ResolverEndpoint
    Properties:
      Direction: INBOUND
      IpAddresses: [{SubnetId: !Ref AWSVPC1Subnet1}, {SubnetId: !Ref AWSVPC1Subnet2}]
      SecurityGroupIds: [!Ref AWSSG]
      Tags: [{Key: Name, Value: R53-Inbound-EP}]

  OutboundEndpoint:
    Type: AWS::Route53Resolver::ResolverEndpoint
    Properties:
      Direction: OUTBOUND
      IpAddresses: [{SubnetId: !Ref AWSVPC1Subnet1}, {SubnetId: !Ref AWSVPC1Subnet2}]
      SecurityGroupIds: [!Ref AWSSG]
      Tags: [{Key: Name, Value: R53-Outbound-EP}]

  IDCForwardRule:
    Type: AWS::Route53Resolver::ResolverRule
    Properties:
      DomainName: idcneta.internal
      RuleType: FORWARD
      ResolverEndpointId: !Ref OutboundEndpoint
      TargetIps: [{Ip: 10.80.1.200, Port: '53'}]

  RuleAssociation:
    Type: AWS::Route53Resolver::ResolverRuleAssociation
    Properties: {ResolverRuleId: !Ref IDCForwardRule, VPCId: !Ref AWSVPC1}

  # --- [7] AWS Private Hosted Zone & Records ---
  AWSHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: awsneta.internal
      VPCs: [{VPCId: !Ref AWSVPC1, VpcRegion: !Ref 'AWS::Region'}]

  AWSWEB1Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref AWSHostedZone
      Name: websrv1.awsneta.internal.
      Type: A
      TTL: '60'
      ResourceRecords: ["10.70.1.100"]

  AWSWEB2Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref AWSHostedZone
      Name: websrv2.awsneta.internal.
      Type: A
      TTL: '60'
      ResourceRecords: ["10.70.2.100"]

      