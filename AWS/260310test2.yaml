Parameters:
  KeyName:
    Description: Name of existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
    ConstraintDescription: must be the name of an existing EC2 KeyPair.
  LatestAmiId:
    Description: (DO NOT CHANGE)
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'
    AllowedValues:
      - /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.1.0.0/16
      Tags:
        - Key: Name
          Value: My-VPC      

  Subnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.1.1.0/24
      Tags:
        - Key: Name
          Value: My-Public-SN-1

  Subnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.1.2.0/24
      Tags:
        - Key: Name
          Value: My-Public-SN-2

  Subnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.1.3.0/24
      Tags:
        - Key: Name
          Value: My-Private-SN-3

  Subnet4:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.1.4.0/24
      Tags:
        - Key: Name
          Value: My-Private-SN-4        

  RouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: My-Public-RT

  Subnet1RouteTable1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable1
      SubnetId: !Ref Subnet1

  Subnet2RouteTable1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable1
      SubnetId: !Ref Subnet2

  IGW1:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: My-IGW

  IGW1Attachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IGW1
      VpcId: !Ref VPC

  DefaultPublicRoute1:
    Type: AWS::EC2::Route
    DependsOn: IGW1Attachment
    Properties:
      RouteTableId: !Ref RouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW1

# 1. 테스트용 VPC 및 서브넷 설정
  VPCtest:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 20.1.0.0/16
      Tags:
        - Key: Name
          Value: Test-VPC

  Subnet5:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPCtest
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 20.1.1.0/24 # VPCtest 대역 내로 수정
      Tags:
        - Key: Name
          Value: Test-SN

  # 2. 테스트 VPC용 인터넷 게이트웨이 (IGW)
  IGWTest:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Test-IGW

  IGWTestAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IGWTest
      VpcId: !Ref VPCtest

  # 3. 테스트 VPC용 라우팅 테이블
  RouteTableTest:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPCtest
      Tags:
        - Key: Name
          Value: Test-Public-RT

  DefaultRouteTest:
    Type: AWS::EC2::Route
    DependsOn: IGWTestAttachment
    Properties:
      RouteTableId: !Ref RouteTableTest
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGWTest

  Subnet5Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTableTest
      SubnetId: !Ref Subnet5

# 4. 테스트용 보안 그룹 (80포트 허용) 
  TestSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, SSH, and ICMP for Testing
      VpcId: !Ref VPCtest
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp # 핑(ping) 테스트 허용
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: Test-VPC-SG

  # 5. 테스트용 EC2 인스턴스
  TestInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref Subnet5
          AssociatePublicIpAddress: true # 외부 접속을 위해 공인 IP 할당
          GroupSet: [ !Ref TestSG ]
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install httpd net-snmp-utils httpd-tools -y
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Test VPC Server Works!</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: Test-PublicWebServer            

#기존 인스턴스
  NATInstance1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: NATInstance1
      NetworkInterfaces:
        - DeviceIndex: 0
          NetworkInterfaceId: !Ref Instance1ENIEth0
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          IFACE="$(ip route show default | awk '/default/ {print $5; exit}')"
          dnf install -y iptables-services
          systemctl enable --now iptables
          cat >/etc/sysctl.d/90-nat.conf <<'EOF'
          net.ipv4.ip_forward=1
          EOF
          sysctl --system
          /sbin/iptables -t nat -F
          /sbin/iptables -F FORWARD
          /sbin/iptables -P FORWARD ACCEPT
          /sbin/iptables -t nat -A POSTROUTING -o "$IFACE" -j MASQUERADE
          service iptables save

  Instance1ENIEth0:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet1
      Description: Instance1 eth0
      GroupSet:
      - !Ref NATInstanceSecurityGroup
      PrivateIpAddress: 10.1.1.100
      Tags:
        - Key: Name
          Value: NAT-Instance1-eth0

  VPCEIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  VPCAssociateEIP1:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NATInstance1
    Properties:
      AllocationId: !GetAtt VPCEIP1.AllocationId
      NetworkInterfaceId: !Ref Instance1ENIEth0

  NATInstance2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SourceDestCheck: false
      Tags:
        - Key: Name
          Value: NATInstance2
      NetworkInterfaces:
        - DeviceIndex: 0
          NetworkInterfaceId: !Ref Instance2ENIEth0
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          IFACE="$(ip route show default | awk '/default/ {print $5; exit}')"
          dnf install -y iptables-services
          systemctl enable --now iptables
          cat >/etc/sysctl.d/90-nat.conf <<'EOF'
          net.ipv4.ip_forward=1
          EOF
          sysctl --system
          /sbin/iptables -t nat -F
          /sbin/iptables -F FORWARD
          /sbin/iptables -P FORWARD ACCEPT
          /sbin/iptables -t nat -A POSTROUTING -o "$IFACE" -j MASQUERADE
          service iptables save

  Instance2ENIEth0:
    Type: AWS::EC2::NetworkInterface
    Properties:
      SubnetId: !Ref Subnet2
      Description: Instance2 eth0
      GroupSet:
      - !Ref NATInstanceSecurityGroup
      PrivateIpAddress: 10.1.2.100
      Tags:
        - Key: Name
          Value: NAT-Instance2-eth0

  VPCEIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  VPCAssociateEIP2:
    Type: AWS::EC2::EIPAssociation
    DependsOn: NATInstance2
    Properties:
      AllocationId: !GetAtt VPCEIP2.AllocationId
      NetworkInterfaceId: !Ref Instance2ENIEth0

  RouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: My-Private-RT-1

  Subnet3RouteTable2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable2
      SubnetId: !Ref Subnet3

  NATRoute1:
    Type: AWS::EC2::Route
    DependsOn: NATInstance1
    Properties:
      RouteTableId: !Ref RouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref Instance1ENIEth0

  RouteTable3:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: My-Private-RT-2

  Subnet4RouteTable3Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable3
      SubnetId: !Ref Subnet4

  NATRoute2:
    Type: AWS::EC2::Route
    DependsOn: NATInstance2
    Properties:
      RouteTableId: !Ref RouteTable3
      DestinationCidrBlock: 0.0.0.0/0
      NetworkInterfaceId: !Ref Instance2ENIEth0

