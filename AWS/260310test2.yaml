  # Target Groups
  MainTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TG-Main
      Tags:
        - Key: Name
          Value: TG-Main
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckPath: /index.html
      TargetType: instance
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3

