  # Main ASG
  MainASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy: # <--- 여기에 들어갑니다! (Properties와 같은 레벨)
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT2M
    Properties:
      # AutoScalingGroupName: Main-Web-ASG
      VPCZoneIdentifier:
        - !Ref Subnet3
        - !Ref Subnet4
      Cooldown: 10
      # HealthCheckGracePeriod: 120
      LaunchTemplate:
        LaunchTemplateId: !Ref MainLaunchTemplate
        Version: !GetAtt MainLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      Tags:
        - Key: Name
          Value: web-ASG
          PropagateAtLaunch: true
      TargetGroupARNs:
        - !Ref MainTG # 아래에서 TargetGroup 연결
      HealthCheckType: ELB # SAA 단골 문제! 서비스 상태까지 체크
      HealthCheckGracePeriod: 300 # HealthCheck 무한반복 방지용 시간 넉넉하게
    DependsOn: [ NATRoute1, NATRoute2 ]
    # NAT 인스턴스가 먼저 준비되어야 UserData(dnf install)가 성공합니다.

# [추가] 오토스케일링 정책: 평균 CPU 사용률 50% 유지
  MainASGPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    DependsOn: MainASG  # <--- ASG가 먼저 완료되어야 함을 명시
    Properties:
      AutoScalingGroupName: !Ref MainASG # 현재 코드의 ASG 이름으로 수정
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 50.0 # CPU 평균 50%를 목표로 설정
        DisableScaleIn: true # 테스트를 위해 축소(Scale-in) 기능은 꺼둠 (인스턴스 유지)

# 1. 실제 인스턴스를 1대 줄이는 정책
  ScaleInSimplePolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    DependsOn: MainASG  # <--- ASG가 먼저 완료되어야 함을 명시
    Properties:
      AutoScalingGroupName: !Ref MainASG
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1 # 인스턴스를 1대 뺍니다.
      Cooldown: 300

  # 2. CPU가 10% 이하인지 감시하는 알람 (이미지 내용 반영)
  LowCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: 'CPU <= 10% threshold -> scale in'
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref MainASG # ASG1에서 수정
      Statistic: Average
      Period: 60 # 60초 간격으로 확인
      EvaluationPeriods: 2 # 2번 연속으로
      DatapointsToAlarm: 2 # 2번 다 조건 충족 시 알람
      Threshold: 10 # 10% 기준
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !GetAtt ScaleInSimplePolicy.Arn # ARN을 직접 전달해야 안전하게 작동합니다!        

