Parameters:
  KeyName:
    Description: Name of existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64'

Resources:
  # --- [1] 네트워크 구성 ---
  MyVPC:
    Type: AWS::EC2::VPC
    Properties:
      EnableDnsSupport: true
      EnableDnsHostnames: true
      CidrBlock: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: My-VPC

  MyPublicSN1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true # 수정: 서브넷 내 인스턴스에 퍼블릭 IP 자동 할당
      Tags:
        - Key: Name
          Value: My-Public-SN-1

  MyPublicSN2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MyVPC
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true # 수정: 서브넷 내 인스턴스에 퍼블릭 IP 자동 할당
      Tags:
        - Key: Name
          Value: My-Public-SN-2

  MyIGW:
    Type: AWS::EC2::InternetGateway
  MyIGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref MyIGW
      VpcId: !Ref MyVPC

  MyPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MyVPC
  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: MyIGWAttachment
    Properties:
      RouteTableId: !Ref MyPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref MyIGW

  MyPublicSN1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref MyPublicRT
      SubnetId: !Ref MyPublicSN1
  MyPublicSN2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref MyPublicRT
      SubnetId: !Ref MyPublicSN2

  # --- [2] 보안 그룹 ---
  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from everywhere
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ALB-SG

  WEBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB and SSH
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSG
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: WEB-SG

  # --- [3] EC2 인스턴스 ---
  EC21:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref MyPublicSN1
      SecurityGroupIds:
        - !Ref WEBSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd # 수정: 재부팅 대비 활성화 추가
          echo "<h1>Welcome to EC2-1</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: EC2-1

  EC22:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyName
      SubnetId: !Ref MyPublicSN2
      SecurityGroupIds:
        - !Ref WEBSG
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd
          systemctl start httpd
          systemctl enable httpd # 수정: 재부팅 대비 활성화 추가
          echo "<h1>Welcome to EC2-2</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: EC2-2

  # --- [4] ALB 구성 ---
  MyALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets:
        - !Ref MyPublicSN1
        - !Ref MyPublicSN2
      SecurityGroups:
        - !Ref ALBSG
      Tags:
        - Key: Name
          Value: My-ALB

  MyTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref MyVPC
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /index.html
      Targets:
        - Id: !Ref EC21
        - Id: !Ref EC22

  MyListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup

# 추가: 배포 완료 후 접속 주소를 바로 확인하기 위한 출력 섹션
Outputs:
  ALBURL:
    Description: URL of the Load Balancer
    Value: !Sub http://${MyALB.DNSName}