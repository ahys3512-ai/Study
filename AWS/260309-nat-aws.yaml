AWSTemplateFormatVersion: '2010-09-09'
Description: Lab 6-1 Full Architecture with Detailed Routing (Seoul & Sydney)

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName
  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:

  # ============================================================
  # [1] SEOUL VPC (10.1.0.0/16)
  # ============================================================
  SeoulVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: Seoul-VPC

  SeoulIGW:
    Type: AWS::EC2::InternetGateway
  
  SeoulVPCGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SeoulVPC
      InternetGatewayId: !Ref SeoulIGW

  # --- Seoul Subnets ---
  SeoulPubSN1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      CidrBlock: 10.1.1.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Seoul-Pub-SN1

  SeoulPubSN2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      CidrBlock: 10.1.2.0/24
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: Seoul-Pub-SN2

  SeoulPriSN1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      CidrBlock: 10.1.3.0/24
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: Seoul-Pri-SN1 (websrv1)

  SeoulPriSN2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SeoulVPC
      CidrBlock: 10.1.4.0/24
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      Tags:
        - Key: Name
          Value: Seoul-Pri-SN2 (websrv2)

  # --- Seoul NAT Gateways ---
  SeoulEIP1:
    Type: AWS::EC2::EIP
  SeoulEIP2:
    Type: AWS::EC2::EIP

  SeoulNAT1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt SeoulEIP1.AllocationId
      SubnetId: !Ref SeoulPubSN1

  SeoulNAT2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt SeoulEIP2.AllocationId
      SubnetId: !Ref SeoulPubSN2

  # ------------------------------------------------------------
  # [Seoul Routing Section]
  # ------------------------------------------------------------

  # 1. 서울 퍼블릭 공통 라우트 테이블 (SN 1, 2 공유)
  SeoulPublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Public-Common-RT

  SeoulPublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SeoulPublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref SeoulIGW

  SeoulPubAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SeoulPubSN1
      RouteTableId: !Ref SeoulPublicRT

  SeoulPubAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SeoulPubSN2
      RouteTableId: !Ref SeoulPublicRT

  # 2. 서울 프라이빗 라우트 테이블 1 (SN1 -> NAT1 연결)
  SeoulPriRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Private-RT1

  SeoulPriRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SeoulPriRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref SeoulNAT1

  SeoulPriAssoc1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SeoulPriSN1
      RouteTableId: !Ref SeoulPriRT1

  # 3. 서울 프라이빗 라우트 테이블 2 (SN2 -> NAT2 연결)
  SeoulPriRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SeoulVPC
      Tags:
        - Key: Name
          Value: Seoul-Private-RT2

  SeoulPriRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SeoulPriRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref SeoulNAT2

  SeoulPriAssoc2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SeoulPriSN2
      RouteTableId: !Ref SeoulPriRT2

  # --- Seoul EC2 & ALB ---

  # --- 서울 웹 서버용 보안 그룹 추가 ---
  WebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB
      VpcId: !Ref SeoulVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # --- Seoul EC2 & ALB (수정됨) ---
  SeoulWeb1:
    Type: AWS::EC2::Instance
    DependsOn: 
      - SeoulPriRoute1
      - SeoulNAT1
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SeoulPriSN1
      KeyName: !Ref KeyName
      SecurityGroupIds: [!Ref WebSG] # 보안 그룹 연결
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hello from Seoul Web Server 1</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: websrv1

  SeoulWeb2:
    Type: AWS::EC2::Instance
    DependsOn: 
      - SeoulPriRoute2
      - SeoulNAT2
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SeoulPriSN2
      KeyName: !Ref KeyName
      SecurityGroupIds: [!Ref WebSG] # 보안 그룹 연결
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hello from Seoul Web Server 2</h1>" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: websrv2

  SeoulALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets:
        - !Ref SeoulPubSN1
        - !Ref SeoulPubSN2
      SecurityGroups:
        - !Ref ALBSG

  # 1. ALB 리스너 설정 (80번 포트로 들어오는 입구)
  SeoulALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref SeoulALB
      Port: 80
      Protocol: HTTP
      # 기본 작업: 들어온 요청을 타겟 그룹으로 전달
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref SeoulALBTG

  # 2. 리스너 규칙 (선택 사항이지만 명시적으로 타겟 그룹 지정)
  SeoulALBListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref SeoulALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - '/*'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref SeoulALBTG

  SeoulALBTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref SeoulVPC
      Port: 80
      Protocol: HTTP
      TargetType: instance
      Targets:
        - Id: !Ref SeoulWeb1  # 이 부분이 있어야 타겟 그룹에 등록됩니다.
        - Id: !Ref SeoulWeb2

  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP
      VpcId: !Ref SeoulVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # ============================================================
  # [2] SYDNEY VPC (10.3.0.0/16)
  # ============================================================
  SydneyVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.3.0.0/16
      Tags:
        - Key: Name
          Value: Sydney-VPC

  SydneyIGW:
    Type: AWS::EC2::InternetGateway
  
  SydneyVPCGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SydneyVPC
      InternetGatewayId: !Ref SydneyIGW

  SydneyPubSN:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SydneyVPC
      CidrBlock: 10.3.1.0/24
      Tags:
        - Key: Name
          Value: Sydney-Pub-SN

  SydneyPriSN:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SydneyVPC
      CidrBlock: 10.3.3.0/24
      Tags:
        - Key: Name
          Value: Sydney-Pri-SN

  SydneyEIP:
    Type: AWS::EC2::EIP

  SydneyNAT:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt SydneyEIP.AllocationId
      SubnetId: !Ref SydneyPubSN

  # --- Sydney Routing ---
  SydneyPubRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SydneyVPC

  SydneyPubRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SydneyPubRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref SydneyIGW

  SydneyPubAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SydneyPubSN
      RouteTableId: !Ref SydneyPubRT

  SydneyPriRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SydneyVPC

  SydneyPriRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SydneyPriRT
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref SydneyNAT

  SydneyPriAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SydneyPriSN
      RouteTableId: !Ref SydneyPriRT

  SydneyWebSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH
      VpcId: !Ref SydneyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  SydneyWeb1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SydneyPubSN # 시드니도 접속 테스트를 하려면 Pub으로 바꾸는걸 추천합니다.
      KeyName: !Ref KeyName
      SecurityGroupIds: [!Ref SydneyWebSG] # 추가
      Tags:
        - Key: Name
          Value: websrv1-sydney

Outputs:
  SeoulALBDNS:
    Value: !GetAtt SeoulALB.DNSName