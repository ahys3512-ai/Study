  # Main ASG
  MainASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: Main-Web-ASG
      VPCZoneIdentifier:
        - !Ref Subnet3
        - !Ref Subnet4
      Cooldown: 10
      # HealthCheckGracePeriod: 120
      LaunchTemplate:
        LaunchTemplateId: !Ref MainLaunchTemplate
        Version: !GetAtt MainLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      Tags:
        - Key: Name
          Value: web-ASG
          PropagateAtLaunch: true
      TargetGroupARNs:
        - !Ref MainTG # 아래에서 TargetGroup 연결
      HealthCheckType: ELB # SAA 단골 문제! 서비스 상태까지 체크
      HealthCheckGracePeriod: 300 # HealthCheck 무한반복 방지용 시간 넉넉하게
    DependsOn: [ NATRoute1, NATRoute2 ]
    # NAT 인스턴스가 먼저 준비되어야 UserData(dnf install)가 성공합니다.

  # Dev ASG
  DevASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: Dev-Web-ASG
      VPCZoneIdentifier:
        - !Ref Subnet3
        - !Ref Subnet4
      Cooldown: 10
      # HealthCheckGracePeriod: 120
      LaunchTemplate:
        LaunchTemplateId: !Ref DevLaunchTemplate
        Version: !GetAtt DevLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      Tags:
        - Key: Name
          Value: web-ASG
          PropagateAtLaunch: true
      TargetGroupARNs:
        - !Ref DevTG # 아래에서 TargetGroup 연결
      HealthCheckType: ELB # SAA 단골 문제! 서비스 상태까지 체크
      HealthCheckGracePeriod: 300 # HealthCheck 무한반복 방지용 시간 넉넉하게
    DependsOn: [ NATRoute1, NATRoute2 ]
    # NAT 인스턴스가 먼저 준비되어야 UserData(dnf install)가 성공합니다.

  # Mgt ASG
  MgtASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: Mgt-Web-ASG
      VPCZoneIdentifier:
        - !Ref Subnet3
        - !Ref Subnet4
      Cooldown: 10
      # HealthCheckGracePeriod: 120
      LaunchTemplate:
        LaunchTemplateId: !Ref MgtLaunchTemplate
        Version: !GetAtt MgtLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      Tags:
        - Key: Name
          Value: web-ASG
          PropagateAtLaunch: true
      TargetGroupARNs:
        - !Ref MgtTG # 아래에서 TargetGroup 연결
      HealthCheckType: ELB # SAA 단골 문제! 서비스 상태까지 체크
      HealthCheckGracePeriod: 300 # HealthCheck 무한반복 방지용 시간 넉넉하게
    DependsOn: [ NATRoute1, NATRoute2 ]
    # NAT 인스턴스가 먼저 준비되어야 UserData(dnf install)가 성공합니다.

  # Target Groups
  MainTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TG-Main
      Tags:
        - Key: Name
          Value: TG-Main
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckPath: /index.html
      TargetType: instance
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3

  DevTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TG-Dev
      Tags:
        - Key: Name
          Value: TG-Dev
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckPath: /dev/index.html
      TargetType: instance
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3

  MgtTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: TG-Mgt
      Tags:
        - Key: Name
          Value: TG-Mgt
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      HealthCheckPath: /mgt/index.html
      TargetType: instance
      HealthCheckIntervalSeconds: 10
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3

  # ALB
  MyALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: My-Web-ALB
      Subnets:
        - !Ref Subnet1
        - !Ref Subnet2
      SecurityGroups:
        - !Ref MySecurityGroup # ALB용 보안그룹 (80포트 허용 필수)
      Scheme: internet-facing
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: '60'

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MainTG # 아무 조건 없으면 MainTG로
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP        

  DevRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DevTG
      Conditions:
        - Field: path-pattern
          Values: [ "/dev/*" ]
      ListenerArn: !Ref ALBListener
      Priority: 10

  MgtRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref MgtTG
      Conditions:
        - Field: path-pattern
          Values: [ "/mgt/*" ]
      ListenerArn: !Ref ALBListener
      Priority: 20