  NATInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      Tags:
        - Key: Name
          Value: NAT-SG
      GroupDescription: Enable HTTP access via port 80 and SSH access via port 22
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp #인터넷 접속
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp #SSH 원격접속
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp # ping 테스트
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 10.1.0.0/16

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      Tags:
        - Key: Name
          Value: My-SG
      GroupDescription: Enable HTTP access via port 80 and SSH access via port 22
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          CidrIp: 0.0.0.0/0
        - IpProtocol: -1
          FromPort: -1
          ToPort: -1
          CidrIp: 10.1.0.0/16

# [1] Launch Template: 기본접속경로
  MainLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: My-Web-LaunchTemplate
      LaunchTemplateData:
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups:
              - !Ref MySecurityGroup
            # 프라이빗 서브넷에 배치되므로 공인 IP는 필요 없습니다 (NAT Instance 사용)
            DeleteOnTermination: true
            # AssociatePublicIpAddress: false
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        KeyName: !Ref KeyName
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # 기본 웹 서버 및 도구 설치
            dnf install -y httpd php htop tmux
            systemctl start httpd && systemctl enable httpd
            
            # 메타데이터 토큰 가져오기 (IMDSv2)
            TOKEN=$(curl -sS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            IID=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            LIP=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)
            
            # 테스트용 웹 페이지 생성
            echo "<h1>ASG Instance ID: $IID</h1>" > /var/www/html/index.html
            echo "<h3>Private IP: $LIP</h3>" >> /var/www/html/index.html
            
            # CPU 부하 테스트용 파일 다운로드 (실습용)
            curl -o /var/www/html/load.php https://cloudneta-book.s3.ap-northeast-2.amazonaws.com/chapter5/load.php --silent


# [2] Launch Template: Dev 접속경로
  DevLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: My-Dev-LaunchTemplate
      LaunchTemplateData:
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups:
              - !Ref MySecurityGroup
            # 프라이빗 서브넷에 배치되므로 공인 IP는 필요 없습니다 (NAT Instance 사용)
            DeleteOnTermination: true
            # AssociatePublicIpAddress: false
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        KeyName: !Ref KeyName
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # 기본 웹 서버 및 도구 설치
            dnf install -y httpd php htop tmux
            systemctl start httpd && systemctl enable httpd
            
            # 메타데이터 토큰 가져오기 (IMDSv2)
            TOKEN=$(curl -sS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            IID=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            LIP=$(curl -sS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)
            
            # 테스트용 웹 페이지 생성
            mkdir -p /var/www/html/dev
            echo "<h1>DEV Server: $(hostname)</h1>" > /var/www/html/dev/index.html
            echo "<h3>Private IP: $LIP</h3>" >> /var/www/html/index.html
            
            # CPU 부하 테스트용 파일 다운로드 (실습용)
            curl -o /var/www/html/load.php https://cloudneta-book.s3.ap-northeast-2.amazonaws.com/chapter5/load.php --silent


# [3] Launch Template: Mgt 접속경로
  MgtLaunchTemplate:
