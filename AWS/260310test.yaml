      LaunchTemplateName: My-Mgt-LaunchTemplate
      LaunchTemplateData:
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups:
              - !Ref MySecurityGroup
            # 프라이빗 서브넷에 배치되므로 공인 IP는 필요 없습니다 (NAT Instance 사용)
            DeleteOnTermination: true
            # AssociatePublicIpAddress: false
