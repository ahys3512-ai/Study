<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB 경기 조회</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #181818;
    --border: #2a2a2a; --accent: #c8f135; --accent2: #f13535;
    --text: #f0f0f0; --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 2rem 2.5rem 1.5rem; display: flex; align-items: flex-end; gap: 2rem; flex-wrap: wrap; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.08em; color: var(--accent); line-height: 1; }
  .logo span { color: var(--text); }
  .date-bar { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 280px; }

  input[type="date"] {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    padding: 8px 14px; border-radius: 4px; outline: none; cursor: pointer;
  }
  input[type="date"]:focus { border-color: var(--accent); }

  .btn { background: var(--accent); color: #000; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.1em; padding: 8px 20px; border-radius: 4px; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 14px; border-radius: 4px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  #status-bar { padding: 0.75rem 2.5rem; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); min-height: 36px; }
  #games { padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .game-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 1.25rem 1.5rem; gap: 1rem; border-bottom: 1px solid var(--border); }
  .team-side { display: flex; flex-direction: column; gap: 4px; }
  .team-side.home { align-items: flex-end; }

  .team-abbr { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.05em; line-height: 1; }
  .team-abbr.winner { color: var(--accent); }
  .team-abbr.loser  { color: #444; }
  .team-abbr.neutral { color: var(--text); }
  .team-full { font-size: 11px; color: var(--muted); font-weight: 300; letter-spacing: 0.03em; }

  .score-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .score-box { display: flex; align-items: center; gap: 14px; }
  .score-num { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; min-width: 36px; text-align: center; }
  .score-num.winner { color: var(--accent); }
  .score-num.loser  { color: #444; }
  .score-num.neutral { color: var(--text); }
  .score-sep { font-family: 'IBM Plex Mono', monospace; font-size: 1.2rem; color: var(--border); }

  .status-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .status-badge.live  { color: var(--accent); border-color: var(--accent); background: rgba(200,241,53,0.08); }
  .status-badge.sched { color: #6ab3f5; border-color: #2a4a6a; background: rgba(106,179,245,0.08); }

  .game-stats { display: grid; grid-template-columns: 1fr 1fr; }
  .team-stats { padding: 1rem 1.5rem; }
  .team-stats:first-child { border-right: 1px solid var(--border); }
  .stats-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.75rem; }

  .pitcher-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pitcher-name.na { color: #444; }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-key { color: var(--muted); font-weight: 300; font-size: 12px; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .stat-val.na { color: #333; }

  .loading-overlay { text-align: center; padding: 4rem 2rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .dot-anim::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }
  .empty { color: var(--muted); font-size: 14px; padding: 3rem 0; text-align: center; font-family: 'IBM Plex Mono', monospace; }
  .error { color: var(--accent2); font-size: 13px; padding: 3rem 0; text-align: center; font-family: 'IBM Plex Mono', monospace; line-height: 2; }

  @media (max-width: 600px) {
    header { padding: 1.5rem 1rem 1rem; }
    #games { padding: 1rem; }
    #status-bar { padding: 0.75rem 1rem; }
    .game-header { padding: 1rem; }
    .team-stats { padding: 0.75rem 1rem; }
    .team-abbr { font-size: 1.5rem; }
    .score-num { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">MLB<span>.</span>KR</div>
  <div class="date-bar">
    <input type="date" id="dateInput" />
    <button class="btn" onclick="fetchSchedule()">조회</button>
    <button class="btn-ghost" onclick="setRelativeDate(0)">오늘</button>
    <button class="btn-ghost" onclick="setRelativeDate(-1)">어제</button>
  </div>
</header>

<div id="status-bar"></div>
<div id="games"></div>

<script>
const API = 'http://localhost:5000/api';

function safe(val, fallback) {
  if (val === undefined || val === null || val === '' || String(val).toLowerCase() === 'undefined') return fallback;
  return val;
}

function setRelativeDate(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  document.getElementById('dateInput').value = d.toISOString().slice(0, 10);
  fetchSchedule();
}

function initDate() {
  const kst = new Date(new Date().getTime() + 9 * 3600000);
  document.getElementById('dateInput').value = kst.toISOString().slice(0, 10);
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function getPitcherERA(id) {
  if (!id) return '—';
  try {
    const d = await fetchJSON(`${API}/pitcher_era?id=${id}`);
    const era = d?.stats?.[0]?.splits?.[0]?.stat?.era;
    return era != null ? String(era) : '—';
  } catch { return '—'; }
}

async function getTeamStats(teamId) {
  if (!teamId) return { ops: '—', bullEra: '—' };
  try {
    const d = await fetchJSON(`${API}/team_stats?id=${teamId}`);
    const ops  = d?.hitting?.stats?.[0]?.splits?.[0]?.stat?.ops;
    const era  = d?.pitching?.stats?.[0]?.splits?.[0]?.stat?.era;
    return {
      ops:     ops  != null ? parseFloat(ops).toFixed(3) : '—',
      bullEra: era  != null ? String(era) : '—',
    };
  } catch { return { ops: '—', bullEra: '—' }; }
}

async function enrichGame(g) {
  const awayTeam   = g?.teams?.away?.team   || {};
  const homeTeam   = g?.teams?.home?.team   || {};
  const awaySpInfo = g?.teams?.away?.probablePitcher || {};
  const homeSpInfo = g?.teams?.home?.probablePitcher || {};

  const [awayEra, homeEra, awayStats, homeStats] = await Promise.all([
    getPitcherERA(awaySpInfo.id),
    getPitcherERA(homeSpInfo.id),
    getTeamStats(awayTeam.id),
    getTeamStats(homeTeam.id),
  ]);

  return {
    game: g,
    awayTeam, homeTeam,
    away: { sp: safe(awaySpInfo.fullName, null), era: awayEra, ...awayStats },
    home: { sp: safe(homeSpInfo.fullName, null), era: homeEra, ...homeStats },
  };
}

function statusInfo(g) {
  const s = safe(g?.status?.detailedState, '');
  if (s === 'Final' || s === 'Game Over') return { label: 'Final', cls: '' };
  if (s.includes('Progress')) {
    const inn  = safe(g?.linescore?.currentInningOrdinal, '');
    const half = g?.linescore?.inningHalf === 'Top' ? '▲' : '▼';
    return { label: `LIVE ${half}${inn}`, cls: 'live' };
  }
  if (s === 'Postponed') return { label: 'PPD', cls: '' };
  const time = g?.gameDate
    ? new Date(g.gameDate).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Seoul' })
    : '';
  return { label: time || s || '-', cls: 'sched' };
}

function statRow(key, val) {
  const isNA = !val || val === '—' || val === '-';
  return `<div class="stat-row">
    <span class="stat-key">${key}</span>
    <span class="stat-val${isNA ? ' na' : ''}">${isNA ? '—' : val}</span>
  </div>`;
}

function renderCard(r, idx) {
  const g = r.game;
  const status  = safe(g?.status?.detailedState, '');
  const isFinal = status === 'Final' || status === 'Game Over';
  const si      = statusInfo(g);

  const awayScore = g?.teams?.away?.score;
  const homeScore = g?.teams?.home?.score;
  const hasScore  = awayScore !== undefined && homeScore !== undefined;
  const awayWin   = isFinal && hasScore && awayScore > homeScore;
  const homeWin   = isFinal && hasScore && homeScore > awayScore;

  const abbrCls  = (win) => isFinal ? (win ? 'winner' : 'loser') : 'neutral';
  const scoreCls = (win) => isFinal ? (win ? 'winner' : 'loser') : 'neutral';

  const awayAbbr = safe(r.awayTeam.abbreviation, safe(r.awayTeam.teamCode, 'AWY')).toUpperCase();
  const homeAbbr = safe(r.homeTeam.abbreviation, safe(r.homeTeam.teamCode, 'HME')).toUpperCase();
  const awayFull = safe(r.awayTeam.name, safe(r.awayTeam.teamName, ''));
  const homeFull = safe(r.homeTeam.name, safe(r.homeTeam.teamName, ''));

  const scoreHTML = hasScore
    ? `<div class="score-box">
        <span class="score-num ${scoreCls(awayWin)}">${awayScore}</span>
        <span class="score-sep">:</span>
        <span class="score-num ${scoreCls(homeWin)}">${homeScore}</span>
       </div>`
    : `<div class="score-box"><span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#444">vs</span></div>`;

  return `<div class="game-card" style="animation-delay:${idx * 0.05}s">
    <div class="game-header">
      <div class="team-side away">
        <span class="team-abbr ${abbrCls(awayWin)}">${awayAbbr}</span>
        <span class="team-full">${awayFull}</span>
      </div>
      <div class="score-center">
        ${scoreHTML}
        <span class="status-badge ${si.cls}">${si.label}</span>
      </div>
      <div class="team-side home">
        <span class="team-abbr ${abbrCls(homeWin)}">${homeAbbr}</span>
        <span class="team-full">${homeFull}</span>
      </div>
    </div>
    <div class="game-stats">
      <div class="team-stats">
        <div class="stats-label">원정 · ${awayAbbr}</div>
        <div class="pitcher-name${r.away.sp ? '' : ' na'}">${r.away.sp || '선발 미정'}</div>
        ${statRow('선발 ERA', r.away.era)}
        ${statRow('팀 OPS', r.away.ops)}
        ${statRow('불펜 ERA', r.away.bullEra)}
      </div>
      <div class="team-stats">
        <div class="stats-label">홈 · ${homeAbbr}</div>
        <div class="pitcher-name${r.home.sp ? '' : ' na'}">${r.home.sp || '선발 미정'}</div>
        ${statRow('선발 ERA', r.home.era)}
        ${statRow('팀 OPS', r.home.ops)}
        ${statRow('불펜 ERA', r.home.bullEra)}
      </div>
    </div>
  </div>`;
}

async function fetchSchedule() {
  const dateVal = document.getElementById('dateInput').value;
  if (!dateVal) return;

  const gamesDiv  = document.getElementById('games');
  const statusBar = document.getElementById('status-bar');

  gamesDiv.innerHTML = `<div class="loading-overlay"><span class="dot-anim">데이터 불러오는 중</span></div>`;
  statusBar.textContent = '';

  try {
    const data  = await fetchJSON(`${API}/schedule?date=${dateVal}`);
    const dates = data?.dates || [];

    if (!dates.length || !dates[0].games?.length) {
      gamesDiv.innerHTML = '<div class="empty">해당 날짜에 경기가 없습니다</div>';
      return;
    }

    const games = dates[0].games;
    const [y, m, d] = dateVal.split('-');
    statusBar.textContent = `${y}.${m}.${d} · 총 ${games.length}경기 · 스탯 로딩중...`;

    const results = await Promise.all(games.map(enrichGame));
    statusBar.textContent = `${y}.${m}.${d} · 총 ${games.length}경기`;
    gamesDiv.innerHTML = results.map((r, i) => renderCard(r, i)).join('');

  } catch (e) {
    gamesDiv.innerHTML = `<div class="error">
      서버에 연결할 수 없습니다<br>
      <span style="color:#444;font-size:11px">터미널에서 python server.py 를 먼저 실행해주세요</span><br>
      <span style="color:#333;font-size:11px">${e.message}</span>
    </div>`;
  }
}

initDate();
fetchSchedule();
</script>
</body>
</html>
